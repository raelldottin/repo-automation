name: CodSpeed

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmarks:
    name: Run CodSpeed benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Detect CodSpeed configuration
        id: codspeed
        env:
          HAS_TOKEN: ${{ secrets.CODSPEED_TOKEN != '' && '1' || '0' }}
        run: echo "configured=$HAS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Skip when token is unset
        if: steps.codspeed.outputs.configured != '1'
        run: |
          echo "::notice title=CodSpeed not configured::CODSPEED_TOKEN secret is not set. Add it under Settings -> Secrets and variables -> Actions to enable performance regression tracking."

      - name: Run CodSpeed benchmarks
        if: steps.codspeed.outputs.configured == '1'
        uses: CodSpeedHQ/action@v3
        with:
          token: ${{ secrets.CODSPEED_TOKEN }}
          run: pytest automation/tests/test_benchmarks.py --codspeed
